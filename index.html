      LogOut: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
      Hash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>,
      Loader: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="animate-spin"><circle cx="12" cy="12" r="10" strokeOpacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" strokeOpacity="1"/></svg>,
    };

    // 工具函数
    const parseMarkdown = (text) => {
      if (!text) return '';
      return text
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1"/>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>');
    };

    const formatDate = (dateStr) => {
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
    };

    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

    // ==================== 上下文 ====================
    const AppContext = createContext();

    const AppProvider = ({ children }) => {
      const [data, setData] = useState({
        profile: null,
        skills: [],
        config: null,
        experiences: [],
        portfolios: [],
        journals: [],
        insights: []
      });
      const [loading, setLoading] = useState(true);
      const [user, setUser] = useState(null);
      const [unsubscribes, setUnsubscribes] = useState([]);

      // 初始化数据并监听
      useEffect(() => {
        const initAndListen = async () => {
          setLoading(true);
          
          // 检查是否需要初始化数据
          const profileSnap = await db.collection('profile').doc('main').get();
          if (!profileSnap.exists) {
            // 首次使用，初始化数据
            await db.collection('profile').doc('main').set(INITIAL_DATA.profile);
            await db.collection('config').doc('main').set(INITIAL_DATA.config);
            
            const batch = db.batch();
            INITIAL_EXPERIENCES.forEach(exp => {
              batch.set(db.collection('experiences').doc(exp.id), exp);
            });
            INITIAL_PORTFOLIOS.forEach(port => {
              batch.set(db.collection('portfolios').doc(port.id), port);
            });
            INITIAL_JOURNALS.forEach(j => {
              batch.set(db.collection('journals').doc(j.id), j);
            });
            INITIAL_INSIGHTS.forEach(ins => {
              batch.set(db.collection('insights').doc(ins.id), ins);
            });
            await batch.commit();
          }

          // 设置实时监听
          const unsubs = [];
          
          // profile
          const profileUnsub = db.collection('profile').doc('main').onSnapshot(doc => {
            if (doc.exists) {
              setData(prev => ({ ...prev, profile: doc.data() }));
            }
          });
          unsubs.push(profileUnsub);
          
          // config
          const configUnsub = db.collection('config').doc('main').onSnapshot(doc => {
            if (doc.exists) {
              setData(prev => ({ ...prev, config: doc.data() }));
            }
          });
          unsubs.push(configUnsub);
          
          // experiences
          const expUnsub = db.collection('experiences').orderBy('__name__').onSnapshot(snap => {
            const exps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setData(prev => ({ ...prev, experiences: exps }));
          });
          unsubs.push(expUnsub);
          
          // portfolios
          const portUnsub = db.collection('portfolios').orderBy('date', 'desc').onSnapshot(snap => {
            const ports = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setData(prev => ({ ...prev, portfolios: ports }));
          });
          unsubs.push(portUnsub);
          
          // journals
          const journalUnsub = db.collection('journals').orderBy('date', 'desc').onSnapshot(snap => {
            const journals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setData(prev => ({ ...prev, journals }));
          });
          unsubs.push(journalUnsub);
          
          // insights
          const insightUnsub = db.collection('insights').orderBy('date', 'desc').onSnapshot(snap => {
            const insights = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setData(prev => ({ ...prev, insights }));
          });
          unsubs.push(insightUnsub);
          
          // skills 作为config的一部分
          const skillsUnsub = db.collection('config').doc('main').onSnapshot(doc => {
            if (doc.exists && doc.data().skills) {
              setData(prev => ({ ...prev, skills: doc.data().skills || [] }));
            }
          });
          unsubs.push(skillsUnsub);
          
          setUnsubscribes(unsubs);
          setLoading(false);
        };

        initAndListen();
        
        // Auth 状态监听
        const authUnsub = auth.onAuthStateChanged(setUser);
        
        return () => {
          unsubs.forEach(unsub => unsub());
          authUnsub();
        };
      }, []);

      // Firebase 操作函数
      const addDocument = async (collection, data) => {
        const id = generateId();
        await db.collection(collection).doc(id).set({ ...data, id });
        return id;
      };

      const updateDocument = async (collection, id, data) => {
        await db.collection(collection).doc(id).update(data);
      };

      const deleteDocument = async (collection, id) => {
        await db.collection(collection).doc(id).delete();
      };

      const login = async (email, password) => {
        return auth.signInWithEmailAndPassword(email, password);
      };

      const logout = async () => {
        return auth.signOut();
      };

      // 生成可分享HTML（将当前Firestore数据快照嵌入）
      const generateShareableHTML = useCallback(async () => {
        const snapshot = await db.collection('config').doc('main').get();
        const configData = snapshot.data() || {};
        
        const html = document.documentElement.outerHTML;
        const dataScript = `
          window.__EMBEDDED_DATA__ = {
            profile: ${JSON.stringify(data.profile)},
            skills: ${JSON.stringify(data.skills)},
            config: ${JSON.stringify(configData)},
            experiences: ${JSON.stringify(data.experiences)},
            portfolios: ${JSON.stringify(data.portfolios)},
            journals: ${JSON.stringify(data.journals)},
            insights: ${JSON.stringify(data.insights)}
          };
        `;
        return html.replace('</body>', `<script>${dataScript}<\/script></body>`);
      }, [data]);

      return (
        <AppContext.Provider value={{ 
          data, loading, user, 
          addDocument, updateDocument, deleteDocument,
          login, logout,
          generateShareableHTML 
        }}>
          {children}
        </AppContext.Provider>
      );
    };

    const useApp = () => useContext(AppContext);

    // ==================== 骨架屏组件 ====================
    const Skeleton = ({ className }) => <div className={`skeleton ${className}`} />;

    const LoadingSkeleton = () => (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="w-16 h-16 mx-auto mb-4 rounded-full skeleton"></div>
          <div className="h-6 w-48 mx-auto mb-2 skeleton"></div>
          <div className="h-4 w-32 mx-auto skeleton"></div>
        </div>
      </div>
    );

    // ==================== 前台组件 ====================
    const Navigation = () => {
      const { data } = useApp();
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const navItems = [
        { id: 'about', label: '关于' },
        { id: 'experience', label: '经历' },
        { id: 'portfolio', label: '作品' },
        { id: 'journal', label: '随笔' },
        { id: 'insights', label: '观点' },
        { id: 'contact', label: '联系' },
      ];

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'glass py-3' : 'py-5'}`}>
          <div className="max-w-content mx-auto px-6 flex items-center justify-between">
            <button 
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              className="font-display text-xl font-semibold tracking-tight hover:text-accent transition-colors"
            >
              {data.profile?.name || '加载中...'}
            </button>
            
            <div className="hidden md:flex items-center gap-8">
              {navItems.map(item => (
                <a 
                  key={item.id}
                  href={`#${item.id}`}
                  className="text-sm text-text-secondary hover:text-accent transition-colors"
                >
                  {item.label}
                </a>
              ))}
              <a 
                href="/admin"
                className="text-text-muted hover:text-accent transition-colors p-2"
                title="管理后台"
              >
                <Icons.Settings />
              </a>
            </div>

            <button 
              className="md:hidden text-text-secondary"
              onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
            >
              {mobileMenuOpen ? <Icons.X /> : <Icons.Menu />}
            </button>
          </div>

          {mobileMenuOpen && (
            <div className="md:hidden glass mt-2 mx-4 rounded-2xl p-4">
              {navItems.map(item => (
                <a 
                  key={item.id}
                  href={`#${item.id}`}
                  className="block py-3 text-sm text-text-secondary hover:text-accent transition-colors"
                  onClick={() => setMobileMenuOpen(false)}
                >
                  {item.label}
                </a>
              ))}
              <a href="/admin" className="block py-3 text-sm text-text-muted hover:text-accent transition-colors">
                管理后台
              </a>
            </div>
          )}
        </nav>
      );
    };

    const HeroSection = () => {
      const { data } = useApp();
      const [displayText, setDisplayText] = useState('');
      const fullText = data.config?.heroText || INITIAL_DATA.config.heroText;

      useEffect(() => {
        let index = 0;
        const timer = setInterval(() => {
          if (index <= fullText.length) {
            setDisplayText(fullText.slice(0, index));
            index++;
          } else {
            clearInterval(timer);
          }
        }, 60);
        return () => clearInterval(timer);
      }, [fullText]);

      if (!data.profile) return null;

      return (
        <section className="min-h-screen flex items-center justify-center px-6 pt-20">
          <div className="max-w-content mx-auto text-center">
            <div className="mb-8">
              {data.profile.avatar ? (
                <img 
                  src={data.profile.avatar} 
                  alt={data.profile.name}
                  className="w-28 h-28 mx-auto rounded-full object-cover border-2 border-accent/30 shadow-glow"
                />
              ) : (
                <div className="w-28 h-28 mx-auto rounded-full bg-gradient-to-br from-accent to-amber-600 flex items-center justify-center text-4xl font-display font-bold text-dark shadow-glow">
                  {data.profile.name.slice(0, 1)}
                </div>
              )}
            </div>
            
            <h1 className="font-display text-5xl md:text-7xl font-bold mb-6 tracking-tight">
              {data.profile.name}
            </h1>
            
            <div className="h-8 mb-10">
              <p className="text-xl md:text-2xl text-text-secondary">
                {displayText}<span className="typing-cursor"></span>
              </p>
            </div>
            
            <div className="flex items-center justify-center gap-6">
              {data.profile.socials?.map((social, i) => (
                <a
                  key={i}
                  href={social.url}
                  target="_blank"

                  className="text-text-muted hover:text-accent transition-all p-3 rounded-xl hover:bg-accent-muted"
                  title={social.platform}
                >
                  {social.icon === 'Github' && <Icons.Github />}
                  {social.icon === 'Linkedin' && <Icons.Linkedin />}
                  {social.icon === 'Mail' && <Icons.Mail />}
                </a>
              ))}
            </div>
            
            <div className="mt-20 animate-pulse">
              <a 
                href="#about"
                className="inline-flex flex-col items-center text-text-muted hover:text-accent transition-colors"
              >
                <span className="text-xs mb-3 tracking-widest uppercase">Scroll</span>
                <div className="w-5 h-8 border border-current rounded-full flex justify-center pt-1">
                  <div className="w-1 h-2 bg-current rounded-full animate-bounce"></div>
                </div>
              </a>
            </div>
          </div>
        </section>
      );
    };

    // 滚动显示 Hook
    const useReveal = () => {
      const ref = useRef(null);
      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => entry.isIntersecting && ref.current?.classList.add('visible'),
          { threshold: 0.1 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return ref;
    };

    const AboutSection = () => {
      const { data } = useApp();
      const sectionRef = useReveal();
      const skillsRef = useReveal();

      if (!data.profile) return null;

      return (
        <section id="about" ref={sectionRef} className="reveal py-32 px-6">
          <div className="max-w-content mx-auto">
            <div className="flex items-center gap-4 mb-12">
              <span className="text-accent font-mono text-sm">01</span>
              <h2 className="font-display text-3xl md:text-4xl font-bold">关于我</h2>
            </div>
            
            <div className="grid md:grid-cols-[220px_1fr] gap-12">
              <div className="text-center md:text-left">
                <div className="w-44 h-44 mx-auto md:mx-0 rounded-3xl overflow-hidden bg-gradient-to-br from-accent/20 to-amber-600/10 flex items-center justify-center mb-6">
                  {data.profile.avatar ? (
                    <img src={data.profile.avatar} alt="" className="w-full h-full object-cover" />
                  ) : (
                    <span className="text-6xl font-display font-bold text-accent/50">{data.profile.name.slice(0, 1)}</span>
                  )}
                </div>
                
                <div ref={skillsRef} className="reveal flex flex-wrap gap-2 justify-center md:justify-start">
                  {(data.skills || []).slice(0, 6).map((skill, i) => (
                    <span key={i} className="tag">{skill}</span>
                  ))}
                </div>
              </div>
              
              <div className="space-y-6">
                <div className="p-8 rounded-3xl bg-dark-light border border-dark-border card-hover">
                  <div className="flex items-center gap-3 mb-4">
                    <span className="w-2 h-2 rounded-full bg-accent"></span>
                    <h3 className="text-accent font-semibold">现在</h3>
                  </div>
                  <p className="text-text-secondary leading-relaxed">{data.profile.bio?.now}</p>
                </div>
                
                <div className="p-8 rounded-3xl bg-dark-light border border-dark-border card-hover">
                  <div className="flex items-center gap-3 mb-4">
                    <span className="w-2 h-2 rounded-full bg-text-muted"></span>
                    <h3 className="text-text-muted font-semibold">过去</h3>
                  </div>
                  <p className="text-text-secondary leading-relaxed">{data.profile.bio?.past}</p>
                </div>
                
                <div className="p-8 rounded-3xl bg-dark-light border border-dark-border card-hover">
                  <div className="flex items-center gap-3 mb-4">
                    <span className="w-2 h-2 rounded-full bg-text-muted"></span>
                    <h3 className="text-text-muted font-semibold">未来方向</h3>
                  </div>
                  <p className="text-text-secondary leading-relaxed">{data.profile.bio?.future}</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    const ExperienceSection = () => {
      const { data } = useApp();
      const sectionRef = useReveal();

      if (!data.experiences?.length) return null;

      return (
        <section id="experience" ref={sectionRef} className="reveal py-32 px-6 bg-dark-light/50">
          <div className="max-w-content mx-auto">
            <div className="flex items-center gap-4 mb-12">
              <span className="text-accent font-mono text-sm">02</span>

    const ImageUploader = ({ value, onChange }) => {
      const inputRef = useRef(null);
      
      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          // 压缩图片
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxSize = 400;
              let { width, height } = img;
              if (width > height && width > maxSize) {
                height = (height * maxSize) / width;
                width = maxSize;
              } else if (height > maxSize) {
                width = (width * maxSize) / height;
                height = maxSize;
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const base64 = canvas.toDataURL('image/jpeg', 0.7);
              onChange(base64);
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        }
      };

      return (
        <div>
          <input ref={inputRef} type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
          {value ? (
            <div className="relative group">
              <img src={value} alt="" className="w-full h-32 object-cover rounded-2xl" />
              <button
                onClick={() => onChange('')}
                className="absolute top-2 right-2 p-2 bg-dark/80 rounded-full text-text-muted hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
              >
                <Icons.X />
              </button>
            </div>
          ) : (
            <button
              onClick={() => inputRef.current?.click()}
              className="w-full h-32 border-2 border-dashed border-dark-border rounded-2xl flex flex-col items-center justify-center text-text-muted hover:border-accent hover:text-accent transition-colors"
            >
              <Icons.Upload />
              <span className="text-sm mt-2">上传图片</span>
            </button>
          )}
        </div>
      );
    };

    const TagInput = ({ tags, onChange, suggestions = [] }) => {
      const [input, setInput] = useState('');

      const addTag = (tag) => {
        if (tag && !tags.includes(tag)) {
          onChange([...tags, tag]);
        }
        setInput('');
      };

      const removeTag = (tag) => {
        onChange(tags.filter(t => t !== tag));
      };

      const filteredSuggestions = suggestions.filter(s => 
        s.toLowerCase().includes(input.toLowerCase()) && !tags.includes(s)
      ).slice(0, 5);

      return (
        <div>
          <div className="flex flex-wrap gap-2 mb-3">
            {tags.map((tag, i) => (
              <span key={i} className="tag flex items-center gap-2">
                {tag}

                  <Icons.X />
                </button>
              </span>
            ))}
          </div>
          <div className="relative">
            <input
              type="text"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter') {
                  e.preventDefault();
                  addTag(input);
                }
              }}
              className="w-full px-4 py-3 rounded-xl"
              placeholder="输入标签后按回车"

                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <button onClick={() => handleEdit(item)} className="p-2 text-text-muted hover:text-accent transition-colors">
                        <Icons.Edit />
                      </button>
                      <button onClick={() => handleDelete(item.id)} className="p-2 text-text-muted hover:text-red-500 transition-colors">
                        <Icons.Trash />
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // 个人资料
    const AdminProfile = () => {
      const { data, updateDocument } = useApp();
      const [form, setForm] = useState({});
      const [saved, setSaved] = useState(false);

      useEffect(() => {
        if (data.profile) {
          setForm({ ...data.profile });
        }
      }, [data.profile]);

      const handleSave = async () => {
        await updateDocument('profile', 'main', {
          name: form.name,
          title: form.title,
          tagline: form.tagline,
          avatar: form.avatar,
          bio: form.bio,
          socials: form.socials
        });
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      if (!data.profile) return null;

      return (
        <div className="pt-24 px-6 pb-12">
          <div className="max-w-3xl mx-auto">
            <h2 className="text-2xl font-bold mb-8">个人资料</h2>
            
            <div className="space-y-6">
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm text-text-muted mb-2">姓名</label>
                  <input type="text" value={form.name || ''} onChange={e => setForm({...form, name: e.target.value})} className="w-full px-4 py-3 rounded-xl" />
                </div>
                <div>
                  <label className="block text-sm text-text-muted mb-2">职位</label>
                  <input type="text" value={form.title || ''} onChange={e => setForm({...form, title: e.target.value})} className="w-full px-4 py-3 rounded-xl" />
                </div>
              </div>
              
              <div>
                <label className="block text-sm text-text-muted mb-2">头像（URL或Base64）</label>
                <ImageUploader value={form.avatar || ''} onChange={avatar => setForm({...form, avatar})} />
              </div>

              <div>
                <label className="block text-sm text-text-muted mb-2">现在（当前状态）</label>
                <textarea value={form.bio?.now || ''} onChange={e => setForm({...form, bio: {...form.bio, now: e.target.value}})} className="w-full px-4 py-3 rounded-xl" rows={3} />
              </div>

              <div>
                <label className="block text-sm text-text-muted mb-2">过去（经历背景）</label>
                <textarea value={form.bio?.past || ''} onChange={e => setForm({...form, bio: {...form.bio, past: e.target.value}})} className="w-full px-4 py-3 rounded-xl" rows={3} />
              </div>

              <div>
                <label className="block text-sm text-text-muted mb-2">未来方向</label>
                <textarea value={form.bio?.future || ''} onChange={e => setForm({...form, bio: {...form.bio, future: e.target.value}})} className="w-full px-4 py-3 rounded-xl" rows={3} />
              </div>

              <div>
                <label className="block text-sm text-text-muted mb-2">社交链接</label>
                <div className="space-y-3">
                  {(form.socials || []).map((s, i) => (
                    <div key={i} className="flex gap-3">
                      <select value={s.icon} onChange={e => { const newSocials = [...(form.socials || [])]; newSocials[i] = {...newSocials[i], icon: e.target.value}; setForm({...form, socials: newSocials}); }} className="px-4 py-3 rounded-xl w-36">
                        <option value="Github">GitHub</option>
                        <option value="Linkedin">LinkedIn</option>
                        <option value="Mail">邮箱</option>
                      </select>
                      <input type="url" value={s.url || ''} onChange={e => { const newSocials = [...(form.socials || [])]; newSocials[i] = {...newSocials[i], url: e.target.value}; setForm({...form, socials: newSocials}); }} className="flex-1 px-4 py-3 rounded-xl" placeholder="https://..." />
                    </div>
                  ))}
                </div>
              </div>

              <button onClick={handleSave} className="btn-primary px-6 py-4 rounded-xl flex items-center gap-3">
                {saved ? <Icons.Check /> : null}
                {saved ? '已保存' : '保存修改'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // 设置页
    const AdminSettings = () => {
      const { data, updateDocument, generateShareableHTML } = useApp();
      const [showDeployGuide, setShowDeployGuide] = useState(false);

      const handleModuleToggle = async (module) => {
        const modules = { ...(data.config?.modules || {}), [module]: !(data.config?.modules || {})[module] };
        await updateDocument('config', 'main', { modules });
      };

      const handleExportHTML = async () => {
        const html = await generateShareableHTML();
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${data.profile?.name || '个人品牌站'}-静态版.html`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleExportPDF = () => {
        window.print();
      };

      const handleHeroTextChange = async (text) => {
        await updateDocument('config', 'main', { heroText: text });
      };

      const handleSkillsChange = async (skills) => {
        await updateDocument('config', 'main', { skills });
      };

      return (
        <div className="pt-24 px-6 pb-12">
          <div className="max-w-3xl mx-auto">
            <h2 className="text-2xl font-bold mb-8">个性化设置</h2>
            
            <div className="space-y-8">
              {/* Hero文案 */}
              <div className="p-6 rounded-2xl bg-dark-light border border-dark-border">
                <h3 className="font-semibold mb-4">Hero文案</h3>
                <input
                  type="text"
                  value={data.config?.heroText || ''}
                  onChange={e => handleHeroTextChange(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl"
                  placeholder="输入Hero区域的标语"
                />
              </div>

              {/* 模块显示/隐藏 */}
              <div className="p-6 rounded-2xl bg-dark-light border border-dark-border">
                <h3 className="font-semibold mb-4">模块显示</h3>
                <div className="grid grid-cols-2 gap-3">
                  {Object.entries(data.config?.modules || {}).map(([key, value]) => (
                    <label key={key} className="flex items-center gap-3 p-3 rounded-xl bg-dark cursor-pointer hover:bg-dark-border transition-colors">
                      <input type="checkbox" checked={value} onChange={() => handleModuleToggle(key)} className="w-5 h-5 rounded accent-accent" />
                      <span className="capitalize">{key === 'journal' ? '随笔' : key}</span>
                    </label>
                  ))}
                </div>
              </div>

              {/* 技能标签 */}
              <div className="p-6 rounded-2xl bg-dark-light border border-dark-border">
                <h3 className="font-semibold mb-4">技能标签</h3>
                <TagInput tags={data.skills || []} onChange={handleSkillsChange} />
              </div>

              {/* 导出功能 */}
              <div className="pt-6 border-t border-dark-border">
                <h3 className="font-semibold mb-6">发布与导出</h3>
                <div className="space-y-4">
                  <div className="p-6 rounded-2xl bg-dark-light border border-dark-border">
                    <div className="flex items-start gap-4">
                      <div className="text-accent mt-1">
                        <Icons.Download />
                      </div>
                      <div className="flex-1">
                        <h4 className="font-medium mb-2">生成静态HTML文件</h4>
                        <p className="text-sm text-text-muted mb-4">将当前数据快照嵌入HTML，可部署到任何静态托管服务（生成的页面不会自动更新）</p>
                        <button onClick={handleExportHTML} className="btn-primary px-5 py-3 rounded-xl flex items-center gap-2">
                          <Icons.Download />
                          下载HTML文件
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="p-6 rounded-2xl bg-dark-light border border-dark-border">
                    <div className="flex items-start gap-4">
                      <div className="text-accent mt-1">
                        <Icons.FileText />
                      </div>
                      <div className="flex-1">
                        <h4 className="font-medium mb-2">导出PDF简历</h4>
                        <p className="text-sm text-text-muted mb-4">生成适合打印的PDF格式简历</p>
                        <button onClick={handleExportPDF} className="btn-secondary px-5 py-3 rounded-xl flex items-center gap-2">
                          <Icons.FileText />
                          导出PDF
                        </button>
                      </div>
                    </div>
                  </div>

                  <button 
                    onClick={() => setShowDeployGuide(!showDeployGuide)}
                    className="w-full p-5 rounded-2xl bg-dark-light border border-dark-border text-left hover:border-accent transition-colors"
                  >
                    <div className="flex items-center justify-between">
                      <span className="font-medium">部署指南</span>
                      <span className={`text-text-muted transform transition-transform ${showDeployGuide ? 'rotate-180' : ''}`}>▼</span>
                    </div>
                  </button>

                  {showDeployGuide && (
                    <div className="p-8 rounded-2xl bg-dark border border-dark-border space-y-8">
                      <div>
                        <h4 className="font-medium mb-4 flex items-center gap-3">
                          <span className="w-8 h-8 rounded-full bg-accent/20 text-accent flex items-center justify-center font-bold">1</span>
                          Firebase 已配置 ✅
                        </h4>
                        <p className="text-sm text-text-muted ml-11">Firebase 项目已创建，Firestore 数据库已初始化</p>
                      </div>
                      
                      <div>
                        <h4 className="font-medium mb-4 flex items-center gap-3">
                          <span className="w-8 h-8 rounded-full bg-accent/20 text-accent flex items-center justify-center font-bold">2</span>
                          部署 HTML 到静态托管
                        </h4>
                        <ol className="text-sm text-text-secondary space-y-3 ml-11 list-decimal">
                          <li><strong>Vercel（推荐）</strong>：访问 vercel.com，用 GitHub 登录，点击 "Add New" → 上传或连接仓库</li>
                          <li><strong>Netlify</strong>：访问 netlify.com，直接把 HTML 文件拖到页面中间</li>
                          <li><strong>GitHub Pages</strong>：创建仓库 settings → Pages → 选择 main branch</li>
                        </ol>
                      </div>

                      <div>
                        <h4 className="font-medium mb-4 flex items-center gap-3">
                          <span className="w-8 h-8 rounded-full bg-accent/20 text-accent flex items-center justify-center font-bold">3</span>
                          访问并登录
                        </h4>
                        <p className="text-sm text-text-muted ml-11">打开你的网站地址，点击右上角设置图标进入管理后台，使用以下账号登录：</p>
                        <div className="mt-3 ml-11 p-4 rounded-xl bg-dark-light border border-dark-border">
                          <p className="text-sm">admin@personalbrand.com</p>
                          <p className="text-sm text-text-secondary">Admin@2026!</p>
                        </div>
                      </div>

                      <div>
                        <h4 className="font-medium mb-4 flex items-center gap-3">
                          <span className="w-8 h-8 rounded-full bg-accent/20 text-accent flex items-center justify-center font-bold">4</span>
                          开始编辑
                        </h4>
                        <p className="text-sm text-text-muted ml-11">登录后即可在后台管理所有内容，保存后前台会自动更新</p>
                      </div>

                      <div className="pt-4 border-t border-dark-border">
                        <p className="text-xs text-text-muted">
                          💡 提示：Firebase 的 Firestore 数据库是云端实时同步的，修改内容后所有访问该网站的用户都能看到更新。
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const AdminPage = () => {
      const { user, loading } = useApp();
      const [activeTab, setActiveTab] = useState('portfolio');

      if (loading) return <LoadingSkeleton />;
      if (!user) return <LoginPage />;

      const tabs = [
        { id: 'portfolio', label: '作品集', icon: Icons.FileText },
        { id: 'journal', label: '随笔', icon: Icons.BookOpen },
        { id: 'experience', label: '经历', icon: Icons.Briefcase },
        { id: 'insights', label: '观点', icon: Icons.Hash },
        { id: 'profile', label: '个人资料', icon: Icons.Settings },
        { id: 'settings', label: '设置', icon: Icons.Settings },
      ];

      return (
        <div className="min-h-screen bg-dark">
          <AdminNav />
          
          <div className="sticky top-[65px] z-40 bg-dark/90 backdrop-blur-xl border-b border-dark-border">
            <div className="max-w-6xl mx-auto px-6 py-3 flex gap-2 overflow-x-auto">
              {tabs.map(tab => (
                <TabButton
                  key={tab.id}
                  active={activeTab === tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  icon={tab.icon}
                  label={tab.label}
                />
              ))}
            </div>
          </div>

          {activeTab === 'portfolio' && <AdminPortfolio />}
          {activeTab === 'journal' && <AdminJournal />}
          {activeTab === 'experience' && <AdminExperience />}
          {activeTab === 'insights' && <AdminInsights />}
          {activeTab === 'profile' && <AdminProfile />}
          {activeTab === 'settings' && <AdminSettings />}
        </div>
      );
    };

    // ==================== 主应用 ====================
    const App = () => {
      const isAdmin = window.location.pathname === '/admin';
      return isAdmin ? <AdminPage /> : <HomePage />;
    };

    // 渲染
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>
